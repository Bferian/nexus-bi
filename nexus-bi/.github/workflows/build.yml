name: Build & Deploy Nexus BI

on:
  push:
    branches: [main]

jobs:
  # ── Deploy link mobile (GitHub Pages) ────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web (Link Mobile)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Copiar HTML para pasta de deploy
        run: |
          mkdir -p web-deploy
          cp nexus-bi-celular.html web-deploy/index.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-deploy

  # ── Build Windows .exe ────────────────────────────────────────────────────
  build-windows:
    name: 🖥️ Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Gerar instalador .exe
        run: npx electron-builder --win --publish never

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: NexusBI-Windows
          path: dist-electron/*.exe
          retention-days: 30

  # ── Build macOS .dmg ──────────────────────────────────────────────────────
  build-mac:
    name: 🍎 Build macOS (.dmg)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Gerar instalador .dmg
        run: npx electron-builder --mac --publish never

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: NexusBI-macOS
          path: dist-electron/*.dmg
          retention-days: 30

  # ── Criar Release com os instaladores ────────────────────────────────────
  release:
    name: 🚀 Criar Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: NexusBI-Windows
          path: ./release/windows

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: NexusBI-macOS
          path: ./release/mac

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Nexus BI v${{ github.run_number }}"
          body: |
            ## Nexus BI — Consultor Empresarial Inteligente

            ### Downloads
            - **Windows**: Baixe o `.exe` abaixo e instale normalmente
            - **Mac**: Baixe o `.dmg` abaixo e instale normalmente
            - **Celular / Tablet**: Acesse o link abaixo no Chrome

            ### Link Mobile
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

          files: |
            ./release/windows/*.exe
            ./release/mac/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

